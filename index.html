<div id="app">

<script>
// ── APPS SCRIPT CODE (shown in settings) ─────────────────
const AS_CODE = `const SHEET_NAME = 'Words';
const HEADERS = ['id','word','translation','partOfSpeech','forms',
  'sentences','visualScene','grammarTip','transcription','ukrainianReading',
  'addedAt','nextReview','intervalIndex','reviewCount'];

function getSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName(SHEET_NAME);
  if (!sh) {
    sh = ss.insertSheet(SHEET_NAME);
    sh.appendRow(HEADERS);
    sh.setFrozenRows(1);
  }
  return sh;
}

function doGet(e) {
  try {
    const action = e.parameter.action || 'getAll';
    const data = e.parameter.data ? JSON.parse(e.parameter.data) : {};
    return handle(action, data);
  } catch(err) { return out({success:false,error:err.message}); }
}

function doPost(e) {
  try {
    const b = JSON.parse(e.postData.contents);
    return handle(b.action||'getAll', b.data||b);
  } catch(err) { return out({success:false,error:err.message}); }
}

function handle(action, d) {
  const sh = getSheet();
  if (action === 'getAll') {
    const rows = sh.getDataRange().getValues();
    if (rows.length <= 1) return out({success:true,words:[]});
    const h = rows[0];
    const words = rows.slice(1).map(r => {
      const o = {};
      h.forEach((k,i) => {
        if (k==='sentences') { try{o[k]=JSON.parse(r[i])}catch{o[k]=[]} }
        else if (k==='intervalIndex'||k==='reviewCount') o[k]=Number(r[i])||0;
        else o[k]=String(r[i]||'');
      });
      return o;
    }).filter(w=>w.id);
    return out({success:true,words});
  }
  if (action === 'add') {
    const w = d;
    sh.appendRow([w.id,w.word,w.translation,w.partOfSpeech,w.forms,
      JSON.stringify(w.sentences||[]),w.visualScene||'',w.grammarTip||'',
      w.transcription||'',w.ukrainianReading||'',
      w.addedAt,w.nextReview,w.intervalIndex||0,w.reviewCount||0]);
    return out({success:true});
  }
  if (action === 'delete') {
    const rows = sh.getDataRange().getValues();
    for (let i=1;i<rows.length;i++) {
      if (String(rows[i][0])===String(d.id)) { sh.deleteRow(i+1); return out({success:true}); }
    }
    return out({success:true});
  }
  if (action === 'update') {
    const rows = sh.getDataRange().getValues();
    for (let i=1;i<rows.length;i++) {
      if (String(rows[i][0])===String(d.id)) {
        sh.getRange(i+1,10).setValue(d.nextReview);
        sh.getRange(i+1,11).setValue(d.intervalIndex);
        sh.getRange(i+1,12).setValue(d.reviewCount);
        return out({success:true});
      }
    }
    return out({success:true});
  }
  return out({success:false,error:'Unknown action'});
}

function out(data) {
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}`;

// ── SETTINGS ──────────────────────────────────────────────
const SK = 'vs3';
const CACHE_KEY = 'vw3';
const IVLS = [1,3,7,14,30,60];

function gs() {
  const d = {apiKey:'', sheetsUrl:'', reviewMode:'EN→UA', oxfordId:'', oxfordKey:''};
  try { return {...d,...JSON.parse(localStorage.getItem(SK))}; }
  catch { return d; }
}
function ss(s) { localStorage.setItem(SK, JSON.stringify(s)); }

// ── LOCAL CACHE ───────────────────────────────────────────
function cacheGet() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || []; }
  catch { return []; }
}
function cacheSet(words) {
  localStorage.setItem(CACHE_KEY, JSON.stringify(words));
}

// ── SHEETS API ────────────────────────────────────────────
function hasSheetsUrl() { return !!gs().sheetsUrl; }

async function sheetsGet() {
  const url = gs().sheetsUrl;
  const res = await fetch(`${url}?action=getAll`, { redirect: 'follow' });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Помилка таблиці');
  return data.words;
}

async function sheetsWrite(action, payload) {
  const url = gs().sheetsUrl;
  const res = await fetch(url, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify({ action, ...payload })
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Помилка запису');
}

// ── SYNC ──────────────────────────────────────────────────
let syncing = false;

async function syncFromSheets() {
  if (!hasSheetsUrl()) { setSyncDot('off'); return; }
  setSyncDot('syncing');
  try {
    const words = await sheetsGet();
    cacheSet(words);
    setSyncDot('ok');
    return words;
  } catch(e) {
    setSyncDot('error');
    throw e;
  }
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  if (!d) return;
  d.className = state === 'ok' ? '' : state;
  d.title = {ok:'Синхронізовано ✓', syncing:'Синхронізація…', error:'Помилка з\'єднання', off:'Таблиця не підключена'}[state] || '';
}

// ── DATA OPS ──────────────────────────────────────────────
function todayDate() { const d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }

async function addWord(d) {
  const today = todayDate();
  const entry = {
    id: Date.now().toString(), word: d.correctedWord||d.word, translation: d.translation,
    partOfSpeech: d.partOfSpeech||'слово', forms: d.forms||'',
    sentences: Array.isArray(d.sentences)?d.sentences:[d.sentences||''],
    grammarTip: d.grammarTip||'',
    type: d.type||'', level: d.level||'', style: d.style||'', meaning: d.meaning||'',
    transcription: d.transcription||'', ukrainianReading: d.ukrainianReading||'',
    phrases: Array.isArray(d.phrases)?d.phrases:[],
    synonyms: d.synonyms||'', antonyms: d.antonyms||'',
    addedAt: today, nextReview: today, intervalIndex: 0, reviewCount: 0
  };
  // update cache
  const words = cacheGet();
  words.unshift(entry);
  cacheSet(words);
  // write to sheets
  if (hasSheetsUrl()) {
    setSyncDot('syncing');
    try { await sheetsWrite('add', entry); setSyncDot('ok'); }
    catch(e) { setSyncDot('error'); toast('⚠️ Збережено локально: ' + e.message); }
  }
  return entry;
}

async function delWord(id) {
  const words = cacheGet().filter(w => w.id !== id);
  cacheSet(words);
  if (hasSheetsUrl()) {
    setSyncDot('syncing');
    try { await sheetsWrite('delete', {id}); setSyncDot('ok'); }
    catch(e) { setSyncDot('error'); toast('⚠️ ' + e.message); }
  }
}

async function markReview(id, ok) {
  const words = cacheGet();
  const w = words.find(x => x.id === id);
  if (!w) return;
  w.reviewCount = (w.reviewCount||0) + 1;
  w.intervalIndex = ok ? Math.min((w.intervalIndex||0)+1, IVLS.length-1) : 0;
  const next = new Date(todayDate());
  next.setDate(next.getDate() + IVLS[w.intervalIndex]);
  w.nextReview = next.toISOString();
  cacheSet(words);
  if (hasSheetsUrl()) {
    sheetsWrite('update', {id, nextReview:w.nextReview, intervalIndex:w.intervalIndex, reviewCount:w.reviewCount})
      .catch(() => {});
  }
}

function gw() { return cacheGet(); }

function getDue() {
  const t = new Date(todayDate());
  return gw().filter(w => { const nr=new Date(w.nextReview); return nr<=t; });
}

// ── GEMINI API ────────────────────────────────────────────
async function callGemini(prompt) {
  const s = gs();
  if (!s.apiKey) throw new Error('API ключ Gemini не встановлено. Перейди до налаштувань ⚙️');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${s.apiKey}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{response_mime_type:'application/json',temperature:0.7}
    })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Помилка ${res.status}`); }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Порожня відповідь від AI');
  return JSON.parse(text);
}

async function fetchOxford(word) {
  const s = gs();
  if (!s.oxfordId || !s.oxfordKey) return null;
  // Oxford API не підтримує CORS з браузера напряму для file://
  // Використовуємо тільки перше слово (Oxford не підтримує фрази добре)
  const w = word.split(' ')[0].toLowerCase();
  try {
    const res = await fetch(
      `https://od-api.oxforddictionaries.com/api/v2/entries/en-gb/${encodeURIComponent(w)}?fields=pronunciations,definitions,inflections`,
      { headers: { app_id: s.oxfordId, app_key: s.oxfordKey } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const entry = data.results?.[0]?.lexicalEntries?.[0];
    if (!entry) return null;

    // транскрипція
    const pron = entry.pronunciations?.find(p => p.phoneticNotation === 'IPA');
    const transcription = pron ? `/${pron.phoneticSpelling}/` : null;

    // аудіо
    const audio = entry.pronunciations?.find(p => p.audioFile)?.audioFile || null;

    // визначення
    const def = entry.entries?.[0]?.senses?.[0]?.definitions?.[0] || null;

    // форми
    const inflections = entry.inflections?.map(i => i.inflectedForm).join(' / ') || null;

    return { transcription, audio, definition: def, inflections };
  } catch(e) { return null; }
}

async function analyzeWord(word) {
  return callGemini(`Analyze the English expression "${word}" for a Ukrainian learner.
It can be a single word, phrasal verb, idiom, or set phrase — detect automatically.
If misspelled, correct it.

Return ONLY valid JSON:
{
  "correctedWord": "correct form (same as input if correct)",
  "type": "слово or фразове дієслово or ідіома or кліше or вираз",
  "translation": "main Ukrainian translation",
  "meaning": "short explanation in Ukrainian what it means (1 sentence, especially useful for idioms/phrasal verbs)",
  "partOfSpeech": "іменник or дієслово or прикметник or прислівник or фраза or інше",
  "level": "A1 or A2 or B1 or B2 or C1",
  "style": "нейтральне or розмовне or формальне or сленг or книжне",
  "forms": "word/phrase forms as a string, or empty if not applicable",
  "transcription": "IPA transcription",
  "ukrainianReading": "how to read in Ukrainian letters",
  "sentences": [
    {"en": "natural example sentence", "ua": "Ukrainian translation"},
    {"en": "another example sentence", "ua": "Ukrainian translation"},
    {"en": "third example sentence", "ua": "Ukrainian translation"}
  ],
  "phrases": ["phrase with Ukrainian translation in brackets", "phrase 2 (переклад)", "phrase 3 (переклад)"],
  "synonyms": "2-3 synonyms or similar expressions, comma separated, or empty string",
  "antonyms": "2-3 antonyms or opposites, comma separated, or empty string",
  "grammarTip": "practical grammar or usage tip in Ukrainian"
}`);
}

async function genChallenge(words) {
  return callGemini(`Create one simple English sentence (A1-A2 level) using words from this list: ${words.map(w=>w.word).join(', ')}.
Return ONLY valid JSON:
{
  "sentence": "the English sentence",
  "translation": "Ukrainian translation",
  "usedWords": ["word1","word2"]
}`);
}

// ── APP STATE ─────────────────────────────────────────────
let P = 'add';
let pendWord = null;
let addLoading = false;
let revSession = null;
let practData = null;
let batchSession = null; // {queue, idx, done, errors}
let practLoading = false;
let searchQ = '';
let appLoading = true;   // initial load from Sheets
let appError = null;     // init error message

// ── NAVIGATION ────────────────────────────────────────────
const TITLES = {add:'Додати слово',dict:'Мій словник',review:'Повторення',practice:'Практика',settings:'Налаштування'};

function nav(page) {
  P = page;
  if (page==='add') { pendWord=null; addLoading=false; }
  if (page!=='review') revSession=null;
  if (page!=='practice') { practData=null; practLoading=false; }
  document.getElementById('ptitle').textContent = TITLES[page]||'';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.p===page));
  const isSett = page==='settings';
  document.getElementById('sbtn').style.display = isSett?'none':'';
  document.getElementById('nav').style.display = isSett?'none':'';
  document.getElementById('main').style.paddingBottom = isSett?'14px':'calc(var(--nh) + 14px)';
  render();
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const m = document.getElementById('main');
  const d = document.createElement('div');
  d.className = 'pe';
  if (appLoading) {
    d.innerHTML = `<div class="ldf"><div class="spin spin-lg"></div>Завантаження словника…</div>`;
  } else {
    d.innerHTML = pages[P] ? pages[P]() : '';
  }
  m.innerHTML = ''; m.appendChild(d);
  raf(); badge();
}

function raf() {
  setTimeout(()=>{
    const wi=document.getElementById('wi'); if(wi&&P==='add')wi.focus();
    const ra=document.getElementById('ra'); if(ra)ra.focus();
  },80);
}

function badge() {
  const n = getDue().length;
  const b = document.getElementById('rnb'); if(!b)return;
  const ex = b.querySelector('.rb'); if(ex)ex.remove();
  if(n>0){const s=document.createElement('span');s.className='rb';s.textContent=n>99?'99+':n;b.appendChild(s);}
}

// ── WORD CARD HELPERS ─────────────────────────────────────
function progressColor(idx) {
  if (!idx || idx === 0) return 'var(--text3)';
  if (idx <= 1) return 'var(--red)';
  if (idx <= 3) return 'var(--yellow)';
  return 'var(--green)';
}

function wordItem(w) {
  const color = progressColor(w.intervalIndex);
  const notAnalyzed = !w.translation && !w.forms;
  return `<div class="wi" onclick="openMo('${esc(w.id)}')">
    <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;margin-top:4px"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:.3px;line-height:1.2">
        ${esc(w.word)}
      </div>
      ${w.transcription||w.ukrainianReading ? `
      <div style="font-size:11px;color:var(--text3);margin-bottom:2px">
        ${w.transcription?`<span style="color:var(--acl)">${esc(w.transcription)}</span>`:''}
        ${w.ukrainianReading?`<span style="margin-left:4px">${esc(w.ukrainianReading)}</span>`:''}
      </div>` : ''}
      ${notAnalyzed
        ? `<div style="font-size:12px;color:var(--yellow)">⚡ не проаналізовано</div>`
        : `<div style="font-size:13px;color:var(--text3);font-weight:400">${esc(w.translation)}</div>`}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
      <span class="tag" style="font-size:11px">${esc(w.partOfSpeech||'⚡')}</span>
      ${w.level?`<span style="font-size:10px;color:var(--green);font-weight:700">${esc(w.level)}</span>`:''}
    </div>
  </div>`;
}

function renderWordDetails(w) {
  return `
  ${w.transcription||w.ukrainianReading ? `
  <div class="card" style="text-align:center;padding:14px">
    ${w.transcription?`<div style="font-size:20px;color:var(--acl);letter-spacing:1px;margin-bottom:6px">${esc(w.transcription)}</div>`:''}
    ${w.ukrainianReading?`<div style="font-size:15px;color:var(--text2)">читається: <b style="color:var(--text)">${esc(w.ukrainianReading)}</b></div>`:''}
  </div>` : ''}

  ${w.audio ? `
  <div style="text-align:center;margin-bottom:11px">
    <button onclick="new Audio('${esc(w.audio)}').play()"
      style="background:var(--bg3);border:none;border-radius:100px;padding:10px 20px;
      color:var(--text);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px">
      🔊 Послухати вимову
      ${w.oxfordUsed?`<span style="font-size:10px;color:var(--text3)">Oxford</span>`:''}
    </button>
  </div>` : ''}

  ${w.meaning ? `
  <div class="card" style="border-left:3px solid var(--yellow)">
    <div class="dl">💬 Що означає</div>
    <div class="dc" style="line-height:1.7">${esc(w.meaning)}</div>
  </div>` : ''}

  ${w.oxDefinition ? `
  <div class="card" style="border-left:3px solid var(--blue)">
    <div class="dl">📖 Oxford: визначення (EN)</div>
    <div class="dc" style="line-height:1.7;font-style:italic">${esc(w.oxDefinition)}</div>
  </div>` : ''}

  <div class="card card-ac">
    <div class="dl">Форми слова</div>
    <div class="dc" style="font-family:monospace;color:var(--acl)">${esc(w.forms)}</div>
  </div>

  <div class="card">
    <div class="dl">📝 Приклади речень</div>
    ${(w.sentences||[]).map((s, i) => {
      const en = typeof s === 'object' ? s.en : s;
      const ua = typeof s === 'object' ? s.ua : '';
      const uid = `tr_${w.id||'x'}_${i}`;
      return `<div class="si" style="font-style:normal;margin-bottom:8px">
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px">${esc(en)}</div>
        ${ua?`<div id="${uid}" style="display:none;font-size:12px;color:var(--text3)">${esc(ua)}</div>
        <div onclick="document.getElementById('${uid}').style.display='block';this.style.display='none'"
          style="font-size:12px;color:var(--text3);cursor:pointer;user-select:none">
          👁 показати переклад
        </div>`:''}
      </div>`;
    }).join('')}
  </div>

  ${w.phrases?.length ? `
  <div class="card">
    <div class="dl">💬 Часті фрази</div>
    ${w.phrases.map(p=>`<div class="si" style="font-style:normal">${esc(p)}</div>`).join('')}
  </div>` : ''}

  ${w.synonyms||w.antonyms ? `
  <div class="card">
    ${w.synonyms?`<div style="margin-bottom:${w.antonyms?'10px':'0'}">
      <div class="dl">🔵 Синоніми</div>
      <div class="dc" style="color:var(--blue)">${esc(w.synonyms)}</div>
    </div>`:''}
    ${w.antonyms?`<div>
      <div class="dl">🔴 Антоніми</div>
      <div class="dc" style="color:var(--pink)">${esc(w.antonyms)}</div>
    </div>`:''}
  </div>` : ''}

  <div class="card">
    <div class="dl">💡 Граматична підказка</div>
    <div class="dc">${esc(w.grammarTip)}</div>
  </div>`;
}

function renderResult(d) {
  const wasCorrected = d.correctedWord && d.correctedWord.toLowerCase() !== d.word.toLowerCase();
  return `
  ${wasCorrected ? `
  <div class="info-box yellow" style="margin-bottom:11px">
    ✏️ Схоже ти мав на увазі <b style="color:var(--text)">${esc(d.correctedWord)}</b> — збережено правильне написання
  </div>` : ''}
  <div class="card">
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:5px">${esc(d.correctedWord||d.word)}</div>
      <div style="font-size:20px;color:var(--acl);margin-bottom:10px">${esc(d.translation)}</div>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        ${d.partOfSpeech?`<span class="tag">${esc(d.partOfSpeech)}</span>`:''}
        ${d.type&&d.type!=='слово'?`<span class="tag" style="background:rgba(124,111,245,.25);color:var(--acl)">${esc(d.type)}</span>`:''}
        ${d.level?`<span class="tag" style="background:rgba(82,214,138,.15);color:var(--green)">${esc(d.level)}</span>`:''}
        ${d.style&&d.style!=='нейтральне'?`<span class="tag" style="background:rgba(255,107,138,.15);color:var(--pink)">${esc(d.style)}</span>`:''}
      </div>
    </div>
  </div>
  ${renderWordDetails(d)}
  <div class="row" style="margin-top:6px">
    <button class="btn bs" onclick="pendWord=null;render()">✕ Скасувати</button>
    <button class="btn bp" id="save-btn" onclick="saveWord()">💾 Зберегти</button>
  </div>`;
}

// ── ADD WORD ──────────────────────────────────────────────
function getWordInput() {
  const i = document.getElementById('wi'); if(!i)return null;
  const word = i.value.trim().toLowerCase();
  if (!word) { toast('Введи слово'); return null; }
  if (gw().find(w=>w.word.toLowerCase()===word)) { toast('Це слово вже є у словнику'); return null; }
  return word;
}

async function doAdd() {
  const word = getWordInput(); if(!word)return;
  addLoading=true; render();
  try {
    // запускаємо обидва API паралельно
    const [gemini, oxford] = await Promise.allSettled([
      analyzeWord(word),
      fetchOxford(word)
    ]);

    if (gemini.status === 'rejected') throw new Error(gemini.reason?.message || 'Gemini недоступний');

    const d = gemini.value;
    d.word = word;

    // додаємо дані Oxford якщо є
    if (oxford.status === 'fulfilled' && oxford.value) {
      const ox = oxford.value;
      if (ox.transcription) d.transcription = ox.transcription;
      if (ox.audio) d.audio = ox.audio;
      if (ox.definition) d.oxDefinition = ox.definition;
      if (ox.inflections && !d.forms) d.forms = ox.inflections;
      d.oxfordUsed = true;
    }

    pendWord = d;
  } catch(e) { toast('❌ '+e.message); }
  addLoading=false; render();
}

async function doQuickAdd() {
  const word = getWordInput(); if(!word)return;
  await addWord({ word, translation:'', partOfSpeech:'', forms:'',
    sentences:[], grammarTip:'', transcription:'', ukrainianReading:'',
    phrases:[], synonyms:'', antonyms:'', analyzed:false });
  toast('⚡ "'+word+'" додано! Проаналізуй пізніше.');
  document.getElementById('wi').value='';
}

async function saveWord() {
  if (!pendWord) return;
  const btn = document.getElementById('save-btn');
  if (btn) { btn.disabled=true; btn.textContent='Зберігаємо…'; }
  await addWord(pendWord);
  pendWord=null;
  toast('✓ Слово збережено!');
  nav('dict');
}

// ── MODAL ─────────────────────────────────────────────────
function openMo(id) {
  const w = gw().find(x=>x.id===id); if(!w)return;
  const notAnalyzed = !w.translation && !w.forms;
  document.getElementById('mc').innerHTML = `
    <div class="wdh">
      <div class="wde">${esc(w.word)}</div>
      ${w.translation?`<div class="wdu">${esc(w.translation)}</div>`:''}
      ${w.partOfSpeech?`<span class="tag">${esc(w.partOfSpeech)}</span>`:''}
    </div>
    ${notAnalyzed ? `
      <div class="info-box yellow" style="text-align:center;margin-bottom:14px">
        ⚡ Слово додано швидко — деталі ще не заповнені
      </div>
      <button class="btn bp" id="analyze-btn" onclick="analyzeExisting('${esc(w.id)}')">
        🔍 Аналізувати зараз
      </button>
      <div style="height:11px"></div>
    ` : `
      <div class="divider"></div>
      ${renderWordDetails(w)}
      <div class="divider"></div>
    `}
    <button class="btn bsm" style="background:var(--bg3);color:var(--red);width:100%"
      onclick="doDelWord('${esc(w.id)}')">🗑 Видалити слово</button>`;
  document.getElementById('mo').classList.remove('hidden');
}

function closeMo(e) {
  if(e&&e.target!==document.getElementById('mo'))return;
  document.getElementById('mo').classList.add('hidden');
}

function startBatch() {
  const queue = gw().filter(w => !w.translation && !w.forms);
  if (!queue.length) return;
  // phase: 'analyzing' | 'review'
  batchSession = { queue, idx: 0, done: 0, errors: [], phase: 'analyzing', currentWord: null };
  render();
  processBatchNext();
}

function renderBatch() {
  if (!batchSession) return '';
  const { queue, idx, done, errors, phase, currentWord } = batchSession;
  const total = queue.length;

  // завершено
  if (idx >= total && phase !== 'analyzing') {
    return `<div style="text-align:center;padding:24px 0">
      <div style="font-size:44px;margin-bottom:14px">✅</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Всі слова вивчено!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px">
        Проаналізовано: <b>${done}</b> слів
        ${errors.length?`<br><span style="color:var(--red)">Не вдалось: ${errors.join(', ')}</span>`:''}
      </div>
      <button class="btn bp" onclick="batchSession=null;render()">← До словника</button>
    </div>`;
  }

  const progress = (idx) / total;

  // аналізуємо
  if (phase === 'analyzing') {
    const current = queue[idx];
    return `
      <div style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:6px">${idx+1} / ${total}</div>
      <div class="pb"><div class="pf" style="width:${progress*100}%"></div></div>
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:13px;color:var(--text3);margin-bottom:12px">Аналізуємо…</div>
        <div style="font-size:36px;font-weight:800;color:#fff">${esc(current.word)}</div>
        <div style="margin-top:20px"><div class="spin" style="margin:0 auto"></div></div>
      </div>`;
  }

  // показуємо картку слова
  if (phase === 'review' && currentWord) {
    const isLast = idx >= total;
    return `
      <div style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:6px">${idx} / ${total}</div>
      <div class="pb"><div class="pf" style="width:${progress*100}%"></div></div>
      <div class="card">
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:5px">${esc(currentWord.word)}</div>
          <div style="font-size:20px;color:var(--acl);margin-bottom:8px">${esc(currentWord.translation)}</div>
          <span class="tag">${esc(currentWord.partOfSpeech||'')}</span>
        </div>
      </div>
      ${renderWordDetails(currentWord)}
      <button class="btn bp" style="font-size:17px;padding:16px;margin-top:6px" onclick="batchNext()">
        ${isLast ? '✅ Завершити' : 'Далі →'}
      </button>`;
  }

  return '';
}

function batchNext() {
  if (!batchSession) return;
  batchSession.phase = 'analyzing';
  render();
  processBatchNext();
}

async function processBatchNext() {
  if (!batchSession) return;
  const { queue, idx } = batchSession;
  if (idx >= queue.length) { batchSession.phase = 'review'; render(); return; }

  const w = queue[idx];
  batchSession.phase = 'analyzing';
  render();
  try {
    const d = await analyzeWord(w.word);
    const words = cacheGet();
    const entry = words.find(x => x.id === w.id);
    if (entry) {
      entry.translation = d.translation||''; entry.partOfSpeech = d.partOfSpeech||'';
      entry.forms = d.forms||''; entry.sentences = d.sentences||[];
      entry.grammarTip = d.grammarTip||''; entry.transcription = d.transcription||'';
      entry.ukrainianReading = d.ukrainianReading||''; entry.phrases = d.phrases||[];
      entry.synonyms = d.synonyms||''; entry.antonyms = d.antonyms||'';
      cacheSet(words);
      if (hasSheetsUrl()) {
        try { await sheetsWrite('delete',{id:entry.id}); await sheetsWrite('add',entry); } catch(e){}
      }
    }
    batchSession.done++;
    batchSession.currentWord = cacheGet().find(x=>x.id===w.id);
    batchSession.idx++;
    batchSession.phase = 'review';
    render();
    return; // чекаємо поки юзер натисне "Далі"
  } catch(e) {
    batchSession.errors.push(w.word);
    batchSession.idx++;
    processBatchNext(); // помилка — одразу наступне
  }
}

async function analyzeExisting(id) {
  const btn = document.getElementById('analyze-btn');
  if(btn){ btn.disabled=true; btn.textContent='Аналізуємо…'; }
  const words = cacheGet();
  const w = words.find(x=>x.id===id); if(!w)return;
  try {
    const d = await analyzeWord(w.word);
    w.translation=d.translation||''; w.partOfSpeech=d.partOfSpeech||'';
    w.forms=d.forms||''; w.sentences=d.sentences||[];
    w.grammarTip=d.grammarTip||''; w.transcription=d.transcription||'';
    w.ukrainianReading=d.ukrainianReading||''; w.phrases=d.phrases||[];
    w.synonyms=d.synonyms||''; w.antonyms=d.antonyms||'';
    cacheSet(words);
    if(hasSheetsUrl()){
      setSyncDot('syncing');
      // delete old + re-add with full data
      try{
        await sheetsWrite('delete',{id});
        await sheetsWrite('add', w);
        setSyncDot('ok');
      } catch(e){ setSyncDot('error'); }
    }
    toast('✓ Слово проаналізовано!');
    openMo(id);
    render();
  } catch(e) { toast('❌ '+e.message); if(btn){btn.disabled=false;btn.textContent='🔍 Аналізувати зараз';} }
}

async function doDelWord(id) {
  if(!confirm('Видалити це слово зі словника?'))return;
  document.getElementById('mo').classList.add('hidden');
  await delWord(id);
  render(); toast('Слово видалено');
}

// ── REVIEW ────────────────────────────────────────────────
function setRM(m) { const s=gs(); s.reviewMode=m; ss(s); render(); }

function startRev() {
  const due=getDue(); if(!due.length)return;
  revSession={queue:[...due].sort(()=>Math.random()-.5),idx:0,ok:0,fail:0,phase:'q',answer:''};
  render();
}

function renderRevSession() {
  const {queue,idx,ok,fail,phase,answer}=revSession;
  if(idx>=queue.length)return renderRevEnd();
  const w=queue[idx], total=queue.length, mode=gs().reviewMode;
  const prompt=mode==='EN→UA'?w.word:w.translation;
  const hint=mode==='EN→UA'?'Напиши переклад українською':'Write the English word';
  const correct_a=mode==='EN→UA'?w.translation:w.word;

  if(phase==='q'){
    return `<div class="pb"><div class="pf" style="width:${idx/total*100}%"></div></div>
      <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:14px">${idx+1} / ${total}</div>
      <div class="rw">${esc(prompt)}</div>
      <div class="rh">${hint}</div>
      <input type="text" id="ra" placeholder="${hint}…"
        autocomplete="off" autocapitalize="none" spellcheck="false"
        style="font-size:17px;text-align:center;margin-bottom:12px"
        onkeydown="if(event.key==='Enter')checkAns()">
      <button class="btn bp" style="font-size:17px;padding:15px" onclick="checkAns()">Перевірити →</button>`;
  }

  return `<div class="pb"><div class="pf" style="width:${idx/total*100}%"></div></div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:14px">${idx+1} / ${total}</div>
    <div class="rw">${esc(prompt)}</div>
    <div class="divider"></div>
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:3px">Твоя відповідь:</div>
      <div style="font-size:19px;font-weight:600">${esc(answer||'(порожньо)')}</div>
    </div>
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:3px">Правильна відповідь:</div>
      <div style="font-size:19px;font-weight:700;color:var(--green)">${esc(correct_a)}</div>
    </div>
    <div class="card" style="margin-bottom:11px">
      <div class="dl">Форми</div>
      <div class="dc" style="font-family:monospace;color:var(--acl);margin-bottom:8px">${esc(w.forms)}</div>
      ${w.sentences?.[0]?`<div class="dl">Речення</div><div class="si">${esc(w.sentences[0])}</div>`:''}
    </div>
    <div style="font-size:13px;font-weight:600;text-align:center;margin-bottom:11px;color:var(--text2)">Ти правильно відповів?</div>
    <div class="row">
      <button class="btn br" style="flex:1;padding:15px;font-size:15px" onclick="markAns(false)">✗ Не пам'ятав</button>
      <button class="btn bg" style="flex:1;padding:15px;font-size:15px" onclick="markAns(true)">✓ Пам'ятав</button>
    </div>`;
}

function checkAns() {
  const i=document.getElementById('ra');
  revSession.answer=i?i.value.trim():'';
  revSession.phase='a'; render();
}

async function markAns(ok) {
  const w=revSession.queue[revSession.idx];
  await markReview(w.id, ok);
  if(ok)revSession.ok++;else revSession.fail++;
  revSession.idx++; revSession.phase='q'; revSession.answer='';
  render();
}

function renderRevEnd() {
  const {ok,fail,queue}=revSession;
  const total=queue.length, pct=Math.round(ok/total*100);
  return `<div style="text-align:center;padding:18px 0">
    <div style="font-size:44px;margin-bottom:14px">${pct>=80?'🏆':pct>=50?'👍':'💪'}</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:6px">Повторення завершено!</div>
    <div style="font-size:14px;color:var(--text2)">Результат: ${pct}%</div>
  </div>
  <div style="display:flex;gap:10px;margin:18px 0">
    <div class="sc"><div class="sn" style="color:var(--green)">${ok}</div><div class="sl">Пам'ятав</div></div>
    <div class="sc"><div class="sn" style="color:var(--red)">${fail}</div><div class="sl">Забув</div></div>
    <div class="sc"><div class="sn">${total}</div><div class="sl">Всього</div></div>
  </div>
  <button class="btn bp" style="margin-bottom:9px" onclick="revSession=null;nav('review')">← До повторення</button>
  <button class="btn bs" onclick="nav('practice')">✍️ До практики</button>`;
}

// ── PRACTICE ──────────────────────────────────────────────
async function doChallenge() {
  const all=gw(); if(all.length<3)return;
  const sel=[...all].sort(()=>Math.random()-.5).slice(0,Math.min(5,3+Math.floor(Math.random()*3)));
  practLoading=true; practData=null; render();
  try { const d=await genChallenge(sel); practData={...d,show:false}; }
  catch(e) { toast('❌ '+e.message); }
  practLoading=false; render();
}

function showTr() { if(practData){practData.show=true;render();} }

// ── SETTINGS ACTIONS ──────────────────────────────────────
function saveKey() {
  const i=document.getElementById('aki'); if(!i)return;
  const s=gs(); s.apiKey=i.value.trim(); ss(s);
  toast(s.apiKey?'✓ Ключ збережено!':'Ключ видалено');
}

function saveOxford() {
  const id=document.getElementById('oxid');
  const key=document.getElementById('oxkey');
  if(!id||!key)return;
  const s=gs(); s.oxfordId=id.value.trim(); s.oxfordKey=key.value.trim(); ss(s);
  toast(s.oxfordId?'✓ Oxford підключено!':'Oxford видалено');
  render();
}

function clearOxford() {
  const s=gs(); s.oxfordId=''; s.oxfordKey=''; ss(s);
  toast('Oxford відключено'); render();
}

async function saveSheetsUrl() {
  const i=document.getElementById('sui'); if(!i)return;
  const url=i.value.trim();
  const s=gs(); s.sheetsUrl=url; ss(s);
  if(url){
    toast('Перевіряємо підключення…');
    try {
      appLoading=true; render();
      await syncFromSheets();
      appLoading=false; render();
      toast('✓ Підключено! Завантажено ' + gw().length + ' слів');
    } catch(e) {
      appLoading=false; render();
      toast('❌ '+e.message);
    }
  } else {
    toast('URL видалено'); render();
  }
}

async function doSync() {
  toast('Синхронізація…');
  try {
    await syncFromSheets();
    render();
    toast('✓ Синхронізовано! ' + gw().length + ' слів');
  } catch(e) { toast('❌ '+e.message); }
}

function copyCode() {
  navigator.clipboard?.writeText(AS_CODE).then(()=>toast('✓ Код скопійовано!')).catch(()=>{
    const el=document.getElementById('as-code');
    const range=document.createRange(); range.selectNode(el);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
    document.execCommand('copy'); window.getSelection().removeAllRanges();
    toast('✓ Код скопійовано!');
  });
}

function clearAll() {
  if(!confirm('Видалити ВСІ локальні дані?\n(Дані у Google Таблиці залишаться)'))return;
  localStorage.clear();
  pendWord=null; revSession=null; practData=null; searchQ='';
  toast('Локальні дані очищено');
  nav('add');
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let _tt=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── PWA SETUP ─────────────────────────────────────────────
(function setupPWA(){
  const icon=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#1a1a30"/><text x="50" y="72" font-size="58" text-anchor="middle">📚</text></svg>`;
  const iUrl='data:image/svg+xml,'+encodeURIComponent(icon);
  const manifest={name:'Мій Словник',short_name:'Словник',description:'Вивчай англійські слова з AI',
    start_url:'./',display:'standalone',background_color:'#0d0d1a',theme_color:'#0d0d1a',
    orientation:'portrait',icons:[{src:iUrl,sizes:'192x192',type:'image/svg+xml'},{src:iUrl,sizes:'512x512',type:'image/svg+xml'}]};
  const mb=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const ml=document.getElementById('manifest-link'); if(ml)ml.href=URL.createObjectURL(mb);
  if('serviceWorker' in navigator){
    const sw=`const C='vv2';
self.addEventListener('install',e=>{self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('googleapis.com')||e.request.url.includes('script.google.com'))return;
  e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>{
    if(r)return r;
    return fetch(e.request).then(res=>{if(res.ok)c.put(e.request,res.clone());return res});
  })));
});`;
    const sb=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(sb)).catch(()=>{});
  }
})();

// ── INIT ──────────────────────────────────────────────────
(async function init(){
  appLoading=true;
  render(); // show spinner
  if(hasSheetsUrl()){
    try { await syncFromSheets(); }
    catch(e) { toast('⚠️ Таблиця недоступна — показую кеш'); setSyncDot('error'); }
  } else {
    setSyncDot('off');
  }
  appLoading=false;
  nav('add');
})();
</script>
